stages:
  - deploy

sync-to-hf-spaces:
  stage: deploy
  image: alpine/git
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - multi-agent-ecosystem/**/*
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  script:
    - git config --global user.email "ci@gitlab.com"
    - git config --global user.name "GitLab CI"
    - git clone https://GucciTommy:${HF_TOKEN}@huggingface.co/spaces/GucciTommy/vikturi-ai /tmp/hf-space
    - cp -r multi-agent-ecosystem/. /tmp/hf-space/
    - cd /tmp/hf-space
    - git add -A
    - git commit -m "Sync from GitLab" || echo "Nothing to commit"
    - git push origin main
